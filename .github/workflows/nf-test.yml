name: NF-Test CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  nf-test:
    runs-on: ubuntu-latest

    env:
      NEXTFLOW_VERSION: "24.10.4"
      NF_TEST_VERSION: "0.9.2"
      APPTAINER_VERSION: "1.4.3"
      JAVA_VERSION: "17"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Cache Apptainer .deb to avoid re-downloading on every run ──────────
      - name: Cache Apptainer installer
        id: cache-apptainer
        uses: actions/cache@v4
        with:
          path: /tmp/apptainer_${{ env.APPTAINER_VERSION }}_amd64.deb
          key: apptainer-${{ env.APPTAINER_VERSION }}

      # ── Cache Nextflow binary ──────────────────────────────────────────────
      - name: Cache Nextflow
        id: cache-nextflow
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/nextflow
          key: nextflow-${{ env.NEXTFLOW_VERSION }}

      # ── Cache nf-test binary ───────────────────────────────────────────────
      - name: Cache nf-test
        id: cache-nf-test
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/nf-test
          key: nf-test-${{ env.NF_TEST_VERSION }}

      # ── Java (with built-in Maven/Gradle cache support) ───────────────────
      - name: Set up Java 
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      # ── Install Nextflow (skip if cached) ─────────────────────────────────
      - name: Install Nextflow
        if: steps.cache-nextflow.outputs.cache-hit != 'true'
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/

      # ── Install nf-test (skip if cached) ─────────────────────────────────
      - name: Install nf-test
        if: steps.cache-nf-test.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://code.askimed.com/install/nf-test | bash
          sudo mv nf-test /usr/local/bin/

      # ── Install Apptainer (skip download if .deb is cached) ───────────────
      - name: Download Apptainer installer
        if: steps.cache-apptainer.outputs.cache-hit != 'true'
        run: |
          wget -q -O /tmp/apptainer_${{ env.APPTAINER_VERSION }}_amd64.deb \
            https://github.com/apptainer/apptainer/releases/download/v${{ env.APPTAINER_VERSION }}/apptainer_${{ env.APPTAINER_VERSION }}_amd64.deb

      - name: Install Apptainer
        run: |
          sudo apt-get install -y /tmp/apptainer_${{ env.APPTAINER_VERSION }}_amd64.deb

      # ── Symlink singularity → apptainer (merged into one step) ────────────
      - name: Verify tools
        run: |
          sudo ln -sf /usr/bin/apptainer /usr/local/bin/singularity
          apptainer --version
          singularity --version
          nextflow -version
          nf-test --version

      # ── Run nf-test with CI and debug flags ─────────────────────────────────
      - name: Run nf-test
        run: nf-test test --ci --debug

      # ── Upload error logs on failure ──────────────────────────────────────
      - name: Collect error logs
        if: failure()
        run: |
          mkdir -p $GITHUB_WORKSPACE/logs
          find .nf-test/tests -type d -name "d" -exec cp -r {} $GITHUB_WORKSPACE/logs/ \; 

      - name: Upload logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nf-test-error-logs-${{ github.run_id }}
          path: $GITHUB_WORKSPACE/logs
          retention-days: 7
